<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="628"/><line x1="60" y1="0" x2="60" y2="628"/>
    <line x1="120" y1="0" x2="120" y2="628"/><line x1="180" y1="0" x2="180" y2="628"/>
    <line x1="240" y1="0" x2="240" y2="628"/><line x1="300" y1="0" x2="300" y2="628"/>
    <line x1="360" y1="0" x2="360" y2="628"/><line x1="420" y1="0" x2="420" y2="628"/>
    <line x1="480" y1="0" x2="480" y2="628"/><line x1="540" y1="0" x2="540" y2="628"/>
    <line x1="600" y1="0" x2="600" y2="628"/><line x1="660" y1="0" x2="660" y2="628"/>
    <line x1="720" y1="0" x2="720" y2="628"/><line x1="780" y1="0" x2="780" y2="628"/>
    <line x1="840" y1="0" x2="840" y2="628"/><line x1="900" y1="0" x2="900" y2="628"/>
    <line x1="960" y1="0" x2="960" y2="628"/><line x1="1020" y1="0" x2="1020" y2="628"/>
    <line x1="1080" y1="0" x2="1080" y2="628"/><line x1="1140" y1="0" x2="1140" y2="628"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="180" fill="#4fc3f7" opacity="0.06"/>
  <circle cx="1050" cy="350" r="120" fill="#ffd54f" opacity="0.05"/>
  <circle cx="150" cy="520" r="100" fill="#4fc3f7" opacity="0.04"/>

  <!-- Python logo simplified — two interlocking shapes -->
  <g transform="translate(90, 160)" opacity="0.9">
    <!-- Blue half -->
    <path d="M60,0 C60,0 60,0 30,0 C13.4,0 0,13.4 0,30 L0,60 C0,76.6 13.4,90 30,90 L60,90 L60,96 L30,96 C30,96 30,96 30,96 C6,96 6,126 30,126 L60,126 C76.6,126 90,112.6 90,96 L90,30 C90,13.4 76.6,0 60,0 Z" fill="#4fc3f7"/>
    <circle cx="28" cy="28" r="8" fill="#1a1a2e"/>
    <!-- Gold half -->
    <path d="M30,126 C30,126 30,126 60,126 C76.6,126 90,112.6 90,96 L90,66 C90,49.4 76.6,36 60,36 L30,36 L30,30 L60,30 C60,30 60,30 60,30 C84,30 84,0 60,0 L30,0 C13.4,0 0,13.4 0,30 L0,96 C0,112.6 13.4,126 30,126 Z" fill="#ffd54f" opacity="0.35"/>
    <circle cx="62" cy="98" r="8" fill="#1a1a2e"/>
  </g>

  <!-- Title -->
  <text x="90" y="380" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="52" fill="#ffffff" letter-spacing="-1">
    Everything Is an Object
  </text>

  <!-- Subtitle -->
  <text x="90" y="430" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="24" fill="#8eaccd">
    Mutable, Immutable &amp; How Python Really Works
  </text>

  <!-- Accent line -->
  <rect x="90" y="450" width="160" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tag pills -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600">
    <rect x="90" y="480" width="90" height="32" rx="16" fill="#4fc3f7" opacity="0.15"/>
    <text x="113" y="501" fill="#4fc3f7">Python</text>

    <rect x="195" y="480" width="70" height="32" rx="16" fill="#4fc3f7" opacity="0.15"/>
    <text x="213" y="501" fill="#4fc3f7">OOP</text>

    <rect x="280" y="480" width="110" height="32" rx="16" fill="#4fc3f7" opacity="0.15"/>
    <text x="298" y="501" fill="#4fc3f7">Mutability</text>

    <rect x="405" y="480" width="100" height="32" rx="16" fill="#ffd54f" opacity="0.15"/>
    <text x="421" y="501" fill="#ffd54f">Memory</text>
  </g>

  <!-- Right side: simple object diagram -->
  <g transform="translate(720, 140)" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="18">
    <!-- Variable boxes -->
    <rect x="0" y="0" width="100" height="40" rx="8" fill="#4fc3f7" opacity="0.15" stroke="#4fc3f7" stroke-width="1.5"/>
    <text x="50" y="26" text-anchor="middle" fill="#4fc3f7" font-weight="600">a</text>

    <rect x="0" y="70" width="100" height="40" rx="8" fill="#4fc3f7" opacity="0.15" stroke="#4fc3f7" stroke-width="1.5"/>
    <text x="50" y="96" text-anchor="middle" fill="#4fc3f7" font-weight="600">b</text>

    <!-- Arrows -->
    <line x1="100" y1="20" x2="220" y2="50" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
    <line x1="100" y1="90" x2="220" y2="60" stroke="#ffd54f" stroke-width="2" opacity="0.6"/>

    <!-- Object box -->
    <rect x="220" y="20" width="200" height="70" rx="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
    <text x="260" y="50" fill="#ffffff" opacity="0.9" font-size="16">[1, 2, 3]</text>
    <text x="260" y="75" fill="#8eaccd" font-size="13">id: 0x7f...</text>

    <!-- Mutable label -->
    <rect x="260" y="110" width="100" height="26" rx="13" fill="#4caf50" opacity="0.2"/>
    <text x="310" y="128" text-anchor="middle" fill="#81c784" font-size="13" font-family="'Segoe UI', sans-serif" font-weight="600">mutable</text>

    <!-- Second diagram: immutable -->
    <rect x="0" y="180" width="100" height="40" rx="8" fill="#ffd54f" opacity="0.15" stroke="#ffd54f" stroke-width="1.5"/>
    <text x="50" y="206" text-anchor="middle" fill="#ffd54f" font-weight="600">x</text>

    <line x1="100" y1="200" x2="220" y2="220" stroke="#ffd54f" stroke-width="2" opacity="0.6"/>

    <rect x="220" y="195" width="200" height="55" rx="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
    <text x="260" y="222" fill="#ffffff" opacity="0.9" font-size="16">42</text>
    <text x="260" y="242" fill="#8eaccd" font-size="13">id: 0x9a...</text>

    <!-- Immutable label -->
    <rect x="248" y="268" width="120" height="26" rx="13" fill="#ff7043" opacity="0.2"/>
    <text x="308" y="286" text-anchor="middle" fill="#ff8a65" font-size="13" font-family="'Segoe UI', sans-serif" font-weight="600">immutable</text>
  </g>

  <!-- Bottom credit bar -->
  <rect x="0" y="590" width="1200" height="38" fill="#000000" opacity="0.3"/>
  <text x="90" y="615" font-family="'Segoe UI', sans-serif" font-size="14" fill="#8eaccd">
    Holberton School — Python: Everything is Object
  </text>
</svg>
