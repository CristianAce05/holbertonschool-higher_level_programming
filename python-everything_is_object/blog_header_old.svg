<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Python Objects Diagram</title>
  <desc id="desc">An original diagram showing object identity, mutability, and function argument behavior in Python.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7efe4" />
      <stop offset="100%" stop-color="#d8ecff" />
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef7ff" />
    </linearGradient>
    <style>
      .title { font: 700 62px 'DejaVu Sans', sans-serif; fill: #16324f; }
      .subtitle { font: 400 28px 'DejaVu Sans', sans-serif; fill: #34506b; }
      .label { font: 700 28px 'DejaVu Sans', sans-serif; fill: #16324f; }
      .body { font: 400 24px 'DejaVu Sans', sans-serif; fill: #34506b; }
      .mono { font: 700 26px 'DejaVu Sans Mono', monospace; fill: #9a3412; }
      .small { font: 400 22px 'DejaVu Sans', sans-serif; fill: #34506b; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" rx="36" />
  <circle cx="1320" cy="170" r="120" fill="#ffd9a8" opacity="0.55" />
  <circle cx="280" cy="770" r="150" fill="#c5e4ff" opacity="0.55" />
  <text x="120" y="140" class="title">Mutable, Immutable, Everything Is an Object</text>
  <text x="120" y="190" class="subtitle">Identity, type, mutability, and function argument behavior in Python</text>

  <rect x="110" y="270" width="400" height="230" rx="24" fill="url(#box)" stroke="#7ab6e8" stroke-width="4" />
  <text x="145" y="335" class="label">Identity and Type</text>
  <text x="145" y="390" class="mono">id(obj)</text>
  <text x="145" y="430" class="mono">type(obj)</text>
  <text x="145" y="475" class="small">Two names can point to one object.</text>

  <rect x="600" y="270" width="400" height="230" rx="24" fill="url(#box)" stroke="#7ab6e8" stroke-width="4" />
  <text x="635" y="335" class="label">Mutable Objects</text>
  <text x="635" y="390" class="mono">list.append(4)</text>
  <text x="635" y="430" class="body">Changes contents in place.</text>
  <text x="635" y="475" class="small">Identity usually stays the same.</text>

  <rect x="1090" y="270" width="400" height="230" rx="24" fill="url(#box)" stroke="#7ab6e8" stroke-width="4" />
  <text x="1125" y="335" class="label">Immutable Objects</text>
  <text x="1125" y="390" class="mono">a = a + [5]</text>
  <text x="1125" y="430" class="body">Creates a new object.</text>
  <text x="1125" y="475" class="small">The name is rebound to new memory.</text>

  <path d="M510 385 C560 385, 550 385, 600 385" fill="none" stroke="#16324f" stroke-width="6" marker-end="url(#arrow)" />
  <path d="M1000 385 C1050 385, 1040 385, 1090 385" fill="none" stroke="#16324f" stroke-width="6" marker-end="url(#arrow)" />

  <rect x="220" y="610" width="1160" height="170" rx="28" fill="#16324f" opacity="0.95" />
  <text x="270" y="680" class="label" fill="#ffffff">Core rule:</text>
  <text x="450" y="680" class="body" fill="#ffffff">Functions receive references to objects. Mutating a mutable object is visible outside the function,</text>
  <text x="270" y="725" class="body" fill="#ffffff">but rebinding a local name only changes what that local name points to.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#16324f" />
    </marker>
  </defs>
</svg>
